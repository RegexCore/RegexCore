<svg width="1400" height="280" viewBox="0 0 1400 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RegexCore custom profile banner">
  <defs>
    <linearGradient id="bg-main" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="45%" stop-color="#12263f"/>
      <stop offset="100%" stop-color="#1b3f72"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <pattern id="dot-field" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.13"/>
    </pattern>

    <clipPath id="outer-round">
      <rect x="8" y="8" width="1384" height="264" rx="34"/>
    </clipPath>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font-family: "Trebuchet MS", "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 62px;
        font-weight: 700;
        letter-spacing: 1px;
        fill: #f8fafc;
      }

      .subtitle {
        font-family: "Trebuchet MS", "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 2.5px;
        fill: #bfdbfe;
      }
    </style>
  </defs>

  <g clip-path="url(#outer-round)">
    <rect width="1400" height="280" fill="url(#bg-main)"/>
    <rect width="1400" height="280" fill="url(#dot-field)" opacity="0.45"/>

    <polygon points="0,0 460,0 330,280 0,280" fill="#0a1a2f" fill-opacity="0.62"/>
    <polygon points="980,0 1400,0 1400,280 1090,280" fill="#123459" fill-opacity="0.55"/>

    <g opacity="0.8">
      <path id="main-line" d="M140 210 H400 L470 145 H690" stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="10 10">
        <animate attributeName="stroke-dashoffset" values="0;-120" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite"/>
      </path>
      <path id="main-line-right" d="M860 85 H1065 L1140 150 H1290" stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="10 10">
        <animate attributeName="stroke-dashoffset" values="0;-120" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite"/>
      </path>
      <circle r="4" fill="#a7f3d0">
        <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
          <mpath href="#main-line"/>
        </animateMotion>
      </circle>
      <circle r="4" fill="#a7f3d0" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="4s" begin="4s" repeatCount="indefinite"/>
        <animateMotion dur="4s" begin="4s" repeatCount="indefinite" rotate="auto">
          <mpath href="#main-line-right"/>
        </animateMotion>
      </circle>
      <circle cx="140" cy="210" r="6" fill="#93c5fd"/>
      <circle cx="400" cy="210" r="6" fill="#93c5fd"/>
      <circle cx="470" cy="145" r="6" fill="#34d399"/>
      <circle cx="860" cy="85" r="6" fill="#93c5fd"/>
      <circle cx="1065" cy="85" r="6" fill="#93c5fd"/>
      <circle cx="1140" cy="150" r="6" fill="#34d399"/>
    </g>

    <g filter="url(#soft-glow)">
      <rect x="515" y="63" width="370" height="138" rx="18" fill="#0b1f37" fill-opacity="0.82" stroke="#60a5fa" stroke-opacity="0.45"/>
    </g>

    <g transform="translate(700 128)">
      <text text-anchor="middle" class="title">RegexCore</text>
      <text text-anchor="middle" y="36" class="subtitle">SYSTEMS | AI | HARDWARE</text>
    </g>
  </g>

  <rect x="8" y="8" width="1384" height="264" rx="34" fill="none" stroke="url(#frame)" stroke-width="2"/>
  <rect x="13" y="13" width="1374" height="254" rx="30" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
</svg>
