<svg xmlns="http://www.w3.org/2000/svg" width="720" height="120" viewBox="0 0 720 120" role="img" aria-labelledby="title desc">
  <title id="title">Typing Intro</title>
  <desc id="desc">Premium animated typing intro with rotating lines for embedded systems, AI, and tech stack.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#12161d"/>
      <stop offset="55%" stop-color="#181e28"/>
      <stop offset="100%" stop-color="#1d2430"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0.5" r="1">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0.5" r="1">
      <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0"/>
    </radialGradient>
    <style>
      .frame { fill: url(#bg); stroke: none; }
      .line { font: 600 22px 'Consolas', 'Fira Code', monospace; }
      .line1 { fill: #dbe2ea; }
      .line2 { fill: #c8d0dc; }
      .line3 { fill: #eef2f6; }
    </style>

    <clipPath id="clip1">
      <rect x="24" y="50" width="0" height="32">
        <animate attributeName="width" values="0;510;510;0;0" keyTimes="0;0.22;0.28;0.30;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip2">
      <rect x="24" y="50" width="0" height="32">
        <animate attributeName="width" values="0;0;560;560;0" keyTimes="0;0.34;0.56;0.62;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip3">
      <rect x="24" y="50" width="0" height="32">
        <animate attributeName="width" values="0;0;0;530;530" keyTimes="0;0.68;0.72;0.93;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="1" y="1" width="718" height="118" rx="12" class="frame"/>
  <rect x="1" y="1" width="718" height="118" rx="11" fill="url(#glowLeft)"/>
  <rect x="1" y="1" width="718" height="118" rx="11" fill="url(#glowRight)"/>

  <text x="24" y="72" class="line line1" clip-path="url(#clip1)">&gt; Embedded Systems Engineer
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.05;0.28;0.32;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <text x="24" y="72" class="line line2" clip-path="url(#clip2)">&gt; AI &amp; RAG &amp; MCP Builder
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.32;0.38;0.62;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <text x="24" y="72" class="line line3" clip-path="url(#clip3)">&gt; C/C++ | STM32 | Linux | Python
    <animate attributeName="opacity" values="0;0;0;1;0" keyTimes="0;0.64;0.72;0.95;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <rect x="24" y="51" width="9" height="24" fill="#dbe2ea">
    <animate attributeName="x" values="24;505;505;24;24" keyTimes="0;0.22;0.28;0.30;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0;0" keyTimes="0;0.28;0.30;0.31;1" dur="12s" repeatCount="indefinite"/>
  </rect>
  <rect x="24" y="51" width="9" height="24" fill="#c8d0dc">
    <animate attributeName="x" values="24;24;544;544;24" keyTimes="0;0.34;0.56;0.62;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.34;0.56;0.62;1" dur="12s" repeatCount="indefinite"/>
  </rect>
  <rect x="24" y="51" width="9" height="24" fill="#eef2f6">
    <animate attributeName="x" values="24;24;24;520;520" keyTimes="0;0.68;0.72;0.93;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0;1;0" keyTimes="0;0.68;0.72;0.93;1" dur="12s" repeatCount="indefinite"/>
  </rect>
</svg>
